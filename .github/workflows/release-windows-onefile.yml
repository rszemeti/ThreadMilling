name: Release Windows Onefile

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install PySide6 Nuitka zstandard

      - name: Build one-file executable
        shell: pwsh
        run: |
          python -m nuitka `
            --onefile `
            --enable-plugin=pyside6 `
            --windows-console-mode=disable `
            --output-dir=dist `
            --output-filename=ThreadMillingGUI.exe `
            thread_milling_gui.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThreadMillingGUI-windows-onefile
          path: dist/ThreadMillingGUI.exe

      - name: Upload to existing GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/ThreadMillingGUI.exe
