name: Release Windows Onefile

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Python
        uses: actions/setup-python@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install PySide6 Nuitka zstandard

      - name: Build one-file executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          python -m nuitka `
            --onefile `
            --enable-plugin=pyside6 `
            --assume-yes-for-downloads `
            --show-progress `
            --show-scons `
            --include-qt-plugins=platforms,styles,imageformats `
            --windows-console-mode=attach `
            --output-dir=dist `
            --output-filename=ThreadMillingGUI.exe `
            thread_milling_gui.py 2>&1 | Tee-Object -FilePath dist/nuitka-build.log

          if ($LASTEXITCODE -ne 0) {
            throw "Nuitka build failed with exit code $LASTEXITCODE"
          }

      - name: Verify dist output
        shell: pwsh
        run: |
          Write-Host "Workspace: $PWD"
          if (Test-Path "dist/ThreadMillingGUI.exe") {
            Get-Item "dist/ThreadMillingGUI.exe" | Format-List FullName,Length,LastWriteTime
          } else {
            Write-Host "dist directory contents:"
            if (Test-Path "dist") { Get-ChildItem -Recurse "dist" | Select-Object FullName,Length | Format-Table -AutoSize }
            throw "Expected output dist/ThreadMillingGUI.exe not found"
          }

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ThreadMillingGUI-windows-onefile
          path: dist/ThreadMillingGUI.exe
          if-no-files-found: warn

      - name: Smoke test executable startup
        if: always()
        shell: pwsh
        run: |
          $exe = Join-Path $PWD "dist/ThreadMillingGUI.exe"
          if (-not (Test-Path $exe)) {
            Write-Host "Skipping smoke test: executable not found at $exe"
            exit 0
          }

          $stdoutLog = Join-Path $PWD "dist/smoke-test.stdout.log"
          $stderrLog = Join-Path $PWD "dist/smoke-test.stderr.log"
          $proc = Start-Process -FilePath $exe -PassThru -RedirectStandardOutput $stdoutLog -RedirectStandardError $stderrLog
          Start-Sleep -Seconds 5

          if ($proc.HasExited) {
            $code = $proc.ExitCode
            Write-Host "Executable exited during startup smoke test (exit code: $code)."
            if (Test-Path $stdoutLog) {
              Write-Host "---- smoke-test.stdout.log ----"
              Get-Content $stdoutLog
            }
            if (Test-Path $stderrLog) {
              Write-Host "---- smoke-test.stderr.log ----"
              Get-Content $stderrLog
            }
            throw "Smoke test failed: executable crashed on startup"
          }

          Stop-Process -Id $proc.Id -Force
          Write-Host "Smoke test passed: executable stayed alive for 5 seconds."

      - name: Capture dist diagnostics
        if: always()
        shell: pwsh
        run: |
          $diag = Join-Path $PWD "dist-diagnostics.txt"
          "Workspace: $PWD" | Out-File -FilePath $diag -Encoding utf8
          if (Test-Path "dist") {
            "---- dist tree ----" | Out-File -FilePath $diag -Append -Encoding utf8
            Get-ChildItem -Recurse "dist" | Select-Object FullName,Length,LastWriteTime | Format-Table -AutoSize | Out-String | Out-File -FilePath $diag -Append -Encoding utf8
          } else {
            "dist folder not found" | Out-File -FilePath $diag -Append -Encoding utf8
          }

      - name: Upload smoke-test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ThreadMillingGUI-smoke-logs
          path: |
            dist/nuitka-build.log
            dist/smoke-test.stdout.log
            dist/smoke-test.stderr.log
            dist-diagnostics.txt
          if-no-files-found: ignore

      - name: Upload dist contents for diagnosis
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ThreadMillingGUI-dist-contents
          path: dist/**
          if-no-files-found: ignore

      - name: Fail if executable missing
        if: always()
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/ThreadMillingGUI.exe")) {
            throw "Build did not produce dist/ThreadMillingGUI.exe. Check artifact ThreadMillingGUI-smoke-logs (nuitka-build.log)."
          }

      - name: Upload to existing GitHub Release
        if: github.event_name == 'release' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/ThreadMillingGUI.exe
